<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iridesuwa</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
  <header class="site-header">
    <div class="header-rule top-rule"></div>
    <div class="header-inner">
      <div class="header-left">
        <span class="site-tagline">Works &amp; Studies</span>
      </div>
      <div class="header-center">
        <h1 class="site-logo" id="siteLogo">iridesuwa</h1>
      </div>
      <div class="header-right">
        <button class="theme-btn" id="themeBtn" title="Toggle dark mode">
          <span class="theme-label" id="themeLabel">○</span>
        </button>
      </div>
    </div>
    <div class="header-rule bottom-rule"></div>
  </header>

  <!-- ═══════════════════════════════ ARTBOOK ════════════════════════════════ -->
  <main class="artbook-wrap">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState" style="display:none">
      <p class="empty-text">The gallery is empty.</p>
    </div>

    <!-- Loading state -->
    <div class="loading-state" id="loadingState">
      <div class="loading-ring"></div>
    </div>

    <!-- Book viewer -->
    <div class="book" id="book" style="display:none">
      <div class="page-stage" id="pageStage">
        <!-- Pages injected by JS -->
      </div>
    </div>

  </main>

  <!-- ═══════════════════════════════ NAVIGATION ═══════════════════════════ -->
  <footer class="book-nav" id="bookNav" style="display:none">
    <button class="nav-arrow" id="prevBtn" aria-label="Previous page">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M12.5 15L7.5 10L12.5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="page-counter">
      <span id="currentPage">1</span>
      <span class="counter-sep">—</span>
      <span id="totalPages">1</span>
    </div>
    <button class="nav-arrow" id="nextBtn" aria-label="Next page">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M7.5 15L12.5 10L7.5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </footer>

  <!-- ═══════════════════════════════ ADMIN OVERLAY ═════════════════════════ -->
  <div class="admin-overlay" id="adminOverlay">
    <div class="admin-panel" id="adminPanel">

      <!-- Auth screen -->
      <div class="admin-section" id="adminAuth">
        <div class="admin-panel-header">
          <span class="admin-panel-title">Admin Access</span>
          <button class="panel-close" id="adminClose">✕</button>
        </div>
        <div class="auth-form">
          <label class="auth-field-label">Password
            <input type="password" class="admin-input" id="authPassword" placeholder="Admin password" autocomplete="current-password">
          </label>
          <label class="auth-field-label">GitHub Owner
            <input type="text" class="admin-input" id="authGhOwner" placeholder="your-username" autocomplete="off" spellcheck="false">
          </label>
          <label class="auth-field-label">Repository
            <input type="text" class="admin-input" id="authGhRepo" placeholder="artbook" autocomplete="off" spellcheck="false">
          </label>
          <label class="auth-field-label">Branch
            <input type="text" class="admin-input" id="authGhBranch" placeholder="main" autocomplete="off" spellcheck="false">
          </label>
          <button class="admin-btn primary" id="authSubmit">Unlock</button>
          <p class="auth-error" id="authError"></p>
        </div>
      </div>

      <!-- Editor (shown after auth) -->
      <div class="admin-section" id="adminEditor" style="display:none">
        <div class="admin-panel-header">
          <span class="admin-panel-title">Artbook Editor</span>
          <div class="panel-header-actions">
            <button class="admin-btn save-btn" id="saveConfigBtn">Publish</button>
            <button class="panel-close" id="editorClose">✕</button>
          </div>
        </div>

        <div class="editor-body">

          <!-- Pages list -->
          <div class="pages-manager">
            <div class="pages-manager-header">
              <span class="section-label">Pages</span>
              <button class="admin-btn sm" id="addPageBtn">+ New Page</button>
            </div>
            <div class="pages-list" id="pagesList">
              <!-- Page cards injected by JS -->
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════════════════════ ARTWORK UPLOAD MODAL ══════════════════ -->
  <div class="modal-overlay" id="uploadOverlay" style="display:none">
    <div class="upload-modal">
      <div class="admin-panel-header">
        <span class="admin-panel-title">Add Artwork</span>
        <button class="panel-close" id="uploadClose">✕</button>
      </div>
      <div class="upload-body">
        <div class="drop-zone" id="dropZone">
          <input type="file" id="fileInput" accept="image/*" hidden>
          <div class="drop-inner" id="dropInner">
            <div class="drop-icon">⬡</div>
            <p class="drop-label">Drop image here or <button class="text-btn" id="browseBtn">browse</button></p>
          </div>
          <img class="upload-preview" id="uploadPreview" alt="" style="display:none">
        </div>

        <div class="upload-fields">
          <label class="field-label">File Name (saved in GitHub)
            <div class="filename-row">
              <input type="text" class="admin-input" id="artFilename" placeholder="my-artwork">
              <span class="filename-ext" id="filenameExt">.jpg</span>
            </div>
          </label>
          <label class="field-label">Title
            <input type="text" class="admin-input" id="artTitle" placeholder="Untitled">
          </label>
          <label class="field-label">Date Created
            <input type="date" class="admin-input" id="artDate">
          </label>
          <label class="field-label">Description
            <textarea class="admin-input textarea" id="artDesc" placeholder="About this piece…" rows="3"></textarea>
          </label>
          <label class="field-label">Text Alignment
            <select class="admin-input" id="artTextPos">
              <option value="right">Image left · Text right</option>
              <option value="left">Text left · Image right</option>
            </select>
          </label>
        </div>

        <div class="upload-footer">
          <button class="admin-btn primary upload-submit" id="uploadSubmit">Upload &amp; Add</button>
        </div>

        <div class="upload-progress" id="uploadProgress" style="display:none">
          <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          <p class="progress-label" id="progressLabel">Uploading…</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════ PAGE CARD TEMPLATE ═══════════════════ -->
  <template id="pageCardTemplate">
    <div class="page-card" data-page-id="">
      <div class="page-card-header">
        <span class="page-card-num"></span>
        <div class="page-card-controls">
          <select class="admin-input xs layout-select">
            <option value="flood">Flood — Full bleed</option>
            <option value="large">Large — Centered</option>
            <option value="medium">Medium — 1–2 images</option>
            <option value="small">Small — 2–4 images</option>
          </select>
          <button class="icon-btn delete-page-btn" title="Delete page">✕</button>
        </div>
      </div>
      <div class="page-artworks-list"></div>
      <button class="add-artwork-btn">+ Add Image</button>
    </div>
  </template>

  <script src="js/viewer.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
