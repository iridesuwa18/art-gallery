# netlify.toml — replaces vercel.json

[build]
  publish = "."
  functions = "netlify/functions"

# ── Rewrite /api/* → Netlify functions so the frontend fetch() calls
#    (/api/auth, /api/config, /api/img, /api/upload) need zero changes.
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# ── Security headers (mirrors what vercel.json had) ──────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "SAMEORIGIN"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
