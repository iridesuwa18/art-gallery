<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iridesuwa — Art Concept Generator</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/concept.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="site-header">
    <div class="header-inner">
      <nav class="site-nav">
        <a href="index.html" class="nav-link">Gallery</a>
        <a href="concept.html" class="nav-link active">Concept Generator</a>
      </nav>
      <div class="logo-wrap">
        <h1 class="site-logo">iridesuwa</h1>
      </div>
      <div class="header-actions">
        <button class="theme-btn" id="themeBtn" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg class="theme-icon sun-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.2"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          <svg class="theme-icon moon-icon" viewBox="0 0 20 20" fill="none" style="display:none">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="header-rule"></div>
  </header>

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="concept-main">

    <!-- ── LEFT: GENERATOR PANEL ── -->
    <aside class="gen-panel">
      <div class="gen-panel-header">
        <span class="gen-panel-title">Art Concept Generator</span>
        <div class="gen-header-actions">
          <button class="panel-btn sm" id="randomiseAllBtn" title="Randomise all categories">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M2 4h8.5a3.5 3.5 0 013.5 3.5v0a3.5 3.5 0 01-3.5 3.5H4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M12 2l2 2-2 2M4 10l-2 2 2 2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Randomise All
          </button>
          <button class="panel-btn sm" id="downloadJsonBtn" title="Download as JSON">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v9M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 13h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Export JSON
          </button>
        </div>
      </div>

      <div class="gen-body" id="genBody">
        <!-- Categories are rendered by JS -->
      </div>
    </aside>

    <!-- ── RIGHT: PREVIEW CARD ── -->
    <section class="concept-preview-area">
      <div class="concept-preview-card" id="previewCard">
        <div class="preview-label">Current Concept</div>
        <div class="preview-content" id="previewContent">
          <p class="preview-empty">Configure your categories on the left, then randomise or pick values to see your concept here.</p>
        </div>
        <div class="preview-timer-ring" id="previewTimerRing" style="display:none">
          <svg viewBox="0 0 100 100" class="timer-svg">
            <circle cx="50" cy="50" r="44" class="timer-track"/>
            <circle cx="50" cy="50" r="44" class="timer-fill" id="timerFill"/>
          </svg>
          <div class="timer-text" id="timerText">—</div>
        </div>
      </div>
    </section>

  </main>

  <!-- ═══════════ MEDIUM DETAIL MODAL ═══════════ -->
  <div class="modal-overlay" id="mediumDetailOverlay" style="display:none">
    <div class="medium-detail-modal-row">

      <!-- LEFT: comparison panel (hidden until (+) clicked) -->
      <div class="medium-compare-panel" id="mediumComparePanel" style="display:none">
        <div class="modal-header medium-compare-header">
          <span class="panel-title medium-compare-title">Compare</span>
          <select class="medium-compare-select" id="mediumCompareSelect">
            <option value="">— choose a medium —</option>
          </select>
          <button class="panel-close-btn" id="mediumCompareClose" title="Close comparison">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body medium-detail-body" id="mediumCompareBody">
          <p class="medium-compare-empty">Select a medium above to see its details side by side.</p>
        </div>
      </div>

      <!-- RIGHT: primary detail panel -->
      <div class="modal-box medium-detail-modal" id="mediumDetailModal">
        <div class="modal-header">
          <div class="medium-detail-header-left">
            <!-- (+) compare button — appears when a medium is loaded -->
            <button class="medium-compare-open-btn" id="mediumCompareOpenBtn" title="Compare with another medium" style="display:none">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            </button>
            <span class="panel-title" id="mediumDetailTitle">Medium Details</span>
          </div>
          <button class="panel-close-btn" id="mediumDetailClose">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          </button>
        </div>
        <div class="modal-body medium-detail-body" id="mediumDetailBody">
          <!-- Injected by JS -->
        </div>
      </div>

    </div>
  </div>

  <script src="js/concept.js" defer></script>
  <script>
    // Theme sync (same as main site)
    const themeBtn = document.getElementById('themeBtn');
    const html = document.documentElement;
    const sunIcon = themeBtn.querySelector('.sun-icon');
    const moonIcon = themeBtn.querySelector('.moon-icon');

    function applyTheme(t) {
      html.dataset.theme = t;
      localStorage.setItem('theme', t);
      if (t === 'dark') { sunIcon.style.display = 'none'; moonIcon.style.display = ''; }
      else { sunIcon.style.display = ''; moonIcon.style.display = 'none'; }
    }
    applyTheme(localStorage.getItem('theme') || 'light');
    themeBtn.addEventListener('click', () => applyTheme(html.dataset.theme === 'dark' ? 'light' : 'dark'));
  </script>
</body>
</html>
